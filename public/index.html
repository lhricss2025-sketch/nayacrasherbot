<!DOCTYPE html>
<html>
<head>
    <title>WhatsApp Bot Pairing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        h1 { 
            color: #25D366;
            margin-bottom: 10px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        input { 
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #25D366;
        }
        button { 
            width: 100%;
            padding: 12px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { 
            background: #20BA5A;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        #qrContainer {
            margin: 30px 0;
            text-align: center;
            display: none;
        }
        #qrCode {
            max-width: 300px;
            margin: 0 auto;
        }
        
        #codeContainer { 
            margin: 30px 0; 
            padding: 20px;
            background: #f0f0f0;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .code-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .pairing-code {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 8px;
            color: #25D366;
            font-family: 'Courier New', monospace;
            word-break: break-all;
        }
        
        #status { 
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-top: 20px;
            display: none;
        }
        .connected { 
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .disconnected { 
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .connecting {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #25D366;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 WhatsApp Bot</h1>
        <p class="subtitle">Connect your WhatsApp account</p>
        
        <input type="text" id="phone" placeholder="Enter phone number (e.g., 92)">
        <button id="connectBtn" onclick="connectWhatsApp()">Connect WhatsApp</button>
        
        <div id="qrContainer">
            <p class="code-label">Scan QR Code with WhatsApp:</p>
            <div id="qrCode"></div>
        </div>
        
        <div id="codeContainer">
            <p class="code-label">Or use this pairing code:</p>
            <div class="pairing-code" id="pairingCode">--------</div>
        </div>
        
        <div id="status"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        async function connectWhatsApp() {
            const phone = document.getElementById('phone').value;
            if (!phone) { 
                alert('Please enter phone number'); 
                return; 
            }
            
            const btn = document.getElementById('connectBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Connecting...';
            
            try {
                const res = await fetch('/api/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                
                const data = await res.json();
                if (data.success) {
                    showStatus('Connecting... Please wait for QR code or pairing code', 'connecting');
                    startPolling();
                } else {
                    showStatus('Error: ' + data.error, 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Connect WhatsApp';
                }
            } catch (error) {
                showStatus('Error: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = 'Connect WhatsApp';
            }
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = type;
            statusDiv.style.display = 'block';
        }
        
        async function startPolling() {
            const pollInterval = setInterval(async () => {
                try {
                    const res = await fetch('/api/status');
                    const data = await res.json();
                    
                    if (data.connected) {
                        showStatus('✓ Connected Successfully!', 'connected');
                        clearInterval(pollInterval);
                        document.getElementById('connectBtn').disabled = false;
                        document.getElementById('connectBtn').innerHTML = 'Connect WhatsApp';
                    }
                } catch (error) {
                    console.error('Poll error:', error);
                }
            }, 2000);
        }
        
        async function checkQR() {
            try {
                const res = await fetch('/api/qr');
                const data = await res.json();
                
                if (data.qr) {
                    document.getElementById('qrContainer').style.display = 'block';
                    document.getElementById('qrCode').innerHTML = '';
                    new QRCode(document.getElementById('qrCode'), {
                        text: data.qr,
                        width: 256,
                        height: 256,
                        colorDark: '#000000',
                        colorLight: '#ffffff',
                        correctLevel: QRCode.CorrectLevel.H
                    });
                }
                
                if (data.code) {
                    document.getElementById('codeContainer').style.display = 'block';
                    document.getElementById('pairingCode').textContent = data.code;
                }
            } catch (error) {
                console.error('QR check error:', error);
            }
        }
        
        setInterval(checkQR, 1000);
    </script>
</body>
</html>
